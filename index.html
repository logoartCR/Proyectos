<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="Faviconlogoart.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Proyectos LogoArtCR</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f4f4;
    }

    #mi-catalogo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="mi-catalogo" src=""></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const idProyecto = (urlParams.get('id') || '').trim();

    let urlFinal = "https://script.google.com/macros/s/AKfycbzm_Mk-c49pDICy7NSwrybEcAY1h2niA4AzpNIayTqbTncTwaPjYSQztSIGYhCMTcx-Tg/exec";

    if (idProyecto) {
      const conector = urlFinal.includes('?') ? '&' : '?';
      urlFinal += conector + "id=" + encodeURIComponent(idProyecto);
    }

    document.getElementById('mi-catalogo').src = urlFinal;
  </script>

</body>
</html>
